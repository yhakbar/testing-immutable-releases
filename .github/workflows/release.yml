name: Release

on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rebuild (must match an existing draft release, e.g., v1.0.2)'
        required: true
        type: string

jobs:
  # Validate the release is a draft with a valid semver tag,
  # targeting an explicit commit SHA.
  validate:
    name: Validate Release
    # For release events, only run for draft releases.
    # For workflow_dispatch, always run (we check draft status in a step).
    if: github.event_name == 'workflow_dispatch' || github.event.release.draft == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      ref: ${{ steps.resolve.outputs.ref }}
      skip: ${{ steps.check_changes.outputs.skip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # For release events on drafts, GITHUB_REF points to a tag that
          # doesn't exist yet. Use the release target or fall back to the
          # default branch for workflow_dispatch.
          ref: ${{ github.event.release.target_commitish || github.sha }}

      - name: Check if edit is meaningful
        id: check_changes
        if: github.event.action == 'edited'
        env:
          CHANGES_JSON: ${{ toJSON(github.event.changes) }}
        run: .github/scripts/release/check-edit-meaningful.sh

      - name: Resolve version and ref
        id: resolve
        if: steps.check_changes.outputs.skip != 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_TARGET: ${{ github.event.release.target_commitish }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/release/resolve-version-ref.sh

      - name: Validate semver
        if: steps.check_changes.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: .github/scripts/release/validate-semver.sh "$VERSION"

      - name: Enforce commit SHA target
        if: steps.check_changes.outputs.skip != 'true'
        env:
          REF: ${{ steps.resolve.outputs.ref }}
        run: .github/scripts/release/enforce-commit-sha.sh "$REF"

  # Build artifact (reuses build.yml workflow)
  build:
    name: Build Artifact
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      is_release: true
      ref: ${{ needs.validate.outputs.ref }}
    permissions:
      contents: read

  # Upload artifact to the draft GitHub release
  upload-assets:
    name: Upload Release Assets
    needs: [validate, build]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.ref }}

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: .github/scripts/release/check-release-exists.sh

      - name: Download built artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hello-script
          path: bin/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          echo "Uploading assets for ${VERSION}"
          gh release upload "$VERSION" bin/hello.sh --clobber
          echo "Upload complete"

      - name: Verify upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          echo "Verifying assets for ${VERSION}"
          ASSETS=$(gh release view "$VERSION" --json assets --jq '.assets[].name')
          if echo "$ASSETS" | grep -q "hello.sh"; then
            echo "hello.sh found in release assets"
          else
            echo "ERROR: hello.sh NOT found in release assets" >&2
            exit 1
          fi

      - name: Upload summary
        if: always()
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_ID: ${{ steps.check_release.outputs.release_id }}
          IS_DRAFT: ${{ steps.check_release.outputs.is_draft }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Upload Summary

          | Field | Value |
          |-------|-------|
          | Version | \`${VERSION}\` |
          | Release ID | \`${RELEASE_ID}\` |
          | Draft | ${IS_DRAFT} |
          EOF
